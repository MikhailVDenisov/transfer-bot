[production]
# Замените на IP или доменное имя вашего сервера
# Пример: transfer-bot.example.com ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa
your-server-ip ansible_user=ubuntu

[production:vars]
# Переменные для продакшена
ansible_python_interpreter=/usr/bin/python3
# Telegram Bot Token - будет использоваться в шаблоне .env
telegram_token=YOUR_TELEGRAM_BOT_TOKEN
# Другие переменные окружения при необходимости
# database_url=sqlite:///transfer_bot.db
# waiting_list_check_interval=300
